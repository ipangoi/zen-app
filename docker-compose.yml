
services:

  database:
    image: postgres:15-alpine
    container_name: zen_postgres
    restart: always
    ports:
      - "5433:5432"
    env_file:
      - ./backend/.env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - zen_network

  backend:

    build: ./backend
    container_name: zen_backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - database
    networks:
      - zen_network


  frontend:

    build: ./frontend
    container_name: zen_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - zen_network

networks:
  zen_network:
    driver: bridge
    
volumes:
  postgres_data: